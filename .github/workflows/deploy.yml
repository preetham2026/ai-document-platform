name: AI Document Platform CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install flask boto3 python-dotenv PyPDF2 requests

    - name: Test imports
      run: |
        python -c "
        import flask, boto3, PyPDF2
        print('All imports successful!')
        print('Flask:', flask.__version__)
        "

    - name: Test app structure
      run: |
        test -f app.py && echo "app.py exists!" || exit 1
        test -f requirements.txt && echo "requirements.txt exists!" || exit 1
        test -f Dockerfile && echo "Dockerfile exists!" || exit 1
        echo "All files verified!"

  build-docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t ai-document-platform:latest .
        echo "Docker image built!"

    - name: Test Docker container
      run: |
        docker run -d -p 5000:5000 \
          -e AWS_REGION=us-east-1 \
          -e AWS_ACCESS_KEY_ID=test \
          -e AWS_SECRET_ACCESS_KEY=test \
          -e S3_BUCKET_NAME=test-bucket \
          --name test-container \
          ai-document-platform:latest
        sleep 8
        docker logs test-container
        docker stop test-container
        echo "Container test passed!"

  security-scan:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Trivy
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        echo "Trivy installed!"

    - name: Scan Docker image
      run: |
        docker build -t ai-document-platform:latest .
        trivy image --exit-code 0 --severity HIGH,CRITICAL ai-document-platform:latest
        echo "Security scan complete!"

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        command_timeout: 30m
        script: |
          cd ai-document-platform
          git pull origin main
          sudo docker stop ai-doc-app 2>/dev/null || true
          sudo docker rm ai-doc-app 2>/dev/null || true
          sudo docker build -t ai-document-platform .
          sudo docker run -d -p 5000:5000 \
            --name ai-doc-app \
            --restart unless-stopped \
            -e AWS_REGION=us-east-1 \
            -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
            -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
            -e S3_BUCKET_NAME=ai-document-platform-bucket \
            ai-document-platform
          echo "Deployed successfully!"

  notify:
    runs-on: ubuntu-latest
    needs: deploy-to-ec2
    steps:
    - name: Success
      run: |
        echo "================================================"
        echo "   AI Document Platform — FULLY DEPLOYED!"
        echo "================================================"
        echo "Code tested          ✅"
        echo "Docker built         ✅"
        echo "Security scanned     ✅"
        echo "Deployed to EC2      ✅"
        echo "AWS Bedrock live     ✅"
        echo "================================================"
